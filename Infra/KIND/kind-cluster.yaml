kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: zt-lab
# -----------------------------------------------------------------------------
# Rev6 correction vs the pre-v6 version of this file:
#   Worker node labels now use the v6 canonical tenant names from
#   Driver/constants.py (TENANTS) — tenant-lowpriv / tenant-finserv /
#   tenant-partner / tenant-saas. The old acme/globex/initech/umbrella naming
#   is retired repo-wide (see harness/config.env) and must not be reintroduced
#   here. Controls/c4-tenant-isolation/apply.sh discovers nodes via
#   `kubectl get nodes -l tenant -o jsonpath='...labels.tenant'`, so the label
#   KEY must stay "tenant" and the VALUE must be one of the four names below
#   — apply.sh will hard-fail with "No node found with label tenant=<name>"
#   if these drift.
#
# L2 (cluster access control) is the sole always-active base layer (v6
# Section 1): it is baked into the kube-apiserver static manifest at cluster
# bootstrap via the audit-policy wiring below, not toggled by any Controls/
# script. Only the audit-logging half of L2 is implementable this way; see
# Infra/audit/audit-policy.yaml's header for what's out of scope on a local
# KIND substrate (no OIDC issuer, no private endpoint concept).
#
# CORRECTED (real cluster-boot failure): extraMounts.hostPath below was
# "./infra/audit/" (lowercase, no such folder — the real file lived at
# Infra/KIND/audit-policy.yaml). kind resolves a relative extraMounts
# hostPath against the CURRENT WORKING DIRECTORY *at the moment `kind
# create cluster` runs*, not against this file's own location — and docker
# silently creates an empty directory for a nonexistent bind-mount source
# instead of erroring. So this never failed loudly at cluster-create time;
# it produced a KIND cluster whose control-plane container had an EMPTY
# /etc/kubernetes/policies, which kube-apiserver then refused to start
# without (--audit-policy-file is mandatory once set), which cascades into
# port 6443 never coming up, kubectl/`/version` failing, and kubelet never
# registering — every symptom traces back to this one missing file. Moved
# the real file to Infra/audit/audit-policy.yaml (matching what this
# comment always claimed, just case-corrected) and fixed the path below to
# match. Infra/preflight.sh's _pf_create_kind_cluster_with_retry() also now
# explicitly cds to the repo root before invoking `kind create cluster`
# rather than trusting inherited CWD, so this class of bug can't recur from
# a different invocation context.
#
# Cilium is NOT installed by this file (disableDefaultCNI only prepares the
# cluster for it) and there is no Makefile in this repo to do it either —
# install it explicitly as part of infra/setup.sh's phase1 (added — see that
# file), pinned to the version the Tier-1 invariant check expects:
#   helm install cilium cilium/cilium --version 1.19.3 --namespace kube-system
#
# CORRECTED (validation pass): the control-plane node previously carried no
# label at all, while Driver/driver.py's check_system_pool_isolation() (and
# Tenants/burst_load.sh's CPU-cap watchdog) both select the system node via
# `-l node-pool=system`. With no node ever matching, both silently hit their
# "no nodes labeled..." fallback and passed/degraded unconditionally instead
# of checking anything. The control-plane node below is now labeled
# `node-pool: system` so those checks have something real to find.
# -----------------------------------------------------------------------------
networking:
  disableDefaultCNI: true
nodes:
  - role: control-plane
    labels: { node-pool: system }
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            audit-policy-file: "/etc/kubernetes/policies/audit-policy.yaml"
            audit-log-path: "/var/log/kubernetes/audit.log"
            audit-log-maxsize: "100"
            audit-log-maxbackup: "5"
          extraVolumes:
            - name: audit-policies
              hostPath: "/etc/kubernetes/policies"
              mountPath: "/etc/kubernetes/policies"
              readOnly: true
              pathType: "DirectoryOrCreate"
            - name: audit-logs
              hostPath: "/var/log/kubernetes"
              mountPath: "/var/log/kubernetes"
              readOnly: false
              pathType: DirectoryOrCreate
    extraMounts:
      - hostPath: ./Infra/audit/
        containerPath: /etc/kubernetes/policies
  # One dedicated worker per tenant node pool (v6 Section 13: 5-node cluster,
  # 1 shared system pool [this control-plane node] + 4 user pools, one per
  # tenant). Controls/c4-tenant-isolation/apply.sh taints these
  # `tenant=<name>:NoSchedule` when L4 is toggled on — that taint is applied
  # at runtime, not baseline, so it's deliberately absent here.
  - role: worker
    labels: { tenant: tenant-lowpriv }
  - role: worker
    labels: { tenant: tenant-finserv }
  - role: worker
    labels: { tenant: tenant-partner }
  - role: worker
    labels: { tenant: tenant-saas }
